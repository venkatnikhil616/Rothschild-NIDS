<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: black;
    overflow: hidden;
}

/* MATRIX BACKGROUND */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
}

/* LOGIN CARD */
.login-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    background: rgba(15, 23, 42, 0.9);
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 0 30px rgba(0,255,255,0.2);
    width: 320px;
    text-align: center;
    z-index: 2;
    transition: 0.3s;
}

/* TITLE */
.login-box h2 {
    margin-bottom: 20px;
    text-shadow: 0 0 10px #0ff;
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    background: #020617;
    color: white;
    border: 1px solid #0ff;
    outline: none;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #0ff;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

/* ERROR */
.error {
    color: #ef4444;
    margin-bottom: 10px;
}

/* 🔥 BREACH FLASH */
.breach {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 0, 0, 0.25);
    z-index: 1;
    animation: flash 0.5s ease;
}

/* SHAKE */
.shake {
    animation: shake 0.4s;
}

/* GLITCH TEXT */
.glitch {
    animation: glitch 0.3s;
    color: #ff0000;
    text-shadow: 0 0 10px red;
}

/* ANIMATIONS */
@keyframes flash {
    0% { opacity: 1; }
    100% { opacity: 0; }
}

@keyframes shake {
    0% { transform: translate(-50%, -50%) translateX(0); }
    25% { transform: translate(-50%, -50%) translateX(-10px); }
    50% { transform: translate(-50%, -50%) translateX(10px); }
    75% { transform: translate(-50%, -50%) translateX(-10px); }
    100% { transform: translate(-50%, -50%) translateX(0); }
}

@keyframes glitch {
    0% { transform: skew(0deg); }
    20% { transform: skew(-10deg); }
    40% { transform: skew(10deg); }
    60% { transform: skew(-5deg); }
    80% { transform: skew(5deg); }
    100% { transform: skew(0deg); }
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- BREACH FLASH -->
<div id="breachLayer"></div>

<div id="loginBox" class="login-box">
    <h2 id="title">🔐 Secure Access</h2>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">LOGIN</button>
    </form>
</div>

<script>
// MATRIX EFFECT
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#0ff";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.95)
            drops[i] = 0;

        drops[i]++;
    }
}
setInterval(draw, 50);

// 🚨 BREACH ANIMATION TRIGGER
const hasError = {{ 'true' if error else 'false' }};

if (hasError) {
    const breach = document.createElement("div");
    breach.className = "breach";
    document.body.appendChild(breach);

    const box = document.getElementById("loginBox");
    const title = document.getElementById("title");

    box.classList.add("shake");
    title.classList.add("glitch");

    setTimeout(() => {
        box.classList.remove("shake");
        title.classList.remove("glitch");
    }, 500);
}
</script>

</body>
</html>
